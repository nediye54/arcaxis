<!doctype html>
<html lang="de">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ArcAxis — System Monitoring</title>

<meta name="description" content="ArcAxis entwickelt infrastrukturelle Systeme zur Diagnose struktureller Instabilität in Organisationen und Produktionssystemen.">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:#0b0e13;
color:#e8e8e8;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.wrapper{
text-align:center;
max-width:720px;
padding:40px;
z-index:2;
}

h1{
font-size:46px;
font-weight:600;
letter-spacing:0.06em;
margin-bottom:6px;
}

.subtitle{
color:#8c939c;
font-size:15px;
letter-spacing:0.08em;
margin-bottom:36px;
}

.text{
color:#c4c8ce;
line-height:1.7;
margin-bottom:26px;
font-size:16px;
}

a{
color:#67f08a;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

.contact{
margin-top:28px;
font-size:15px;
color:#9ca3ab;
}

/* Hintergrund Arc */

.orbit{
position:absolute;
width:900px;
height:900px;
border-radius:50%;
border:1px solid rgba(103,240,138,0.15);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:rotate 120s linear infinite;
}

.orbit2{
position:absolute;
width:650px;
height:650px;
border-radius:50%;
border:1px solid rgba(103,240,138,0.08);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:rotateReverse 180s linear infinite;
}

@keyframes rotate{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

@keyframes rotateReverse{
from{transform:translate(-50%,-50%) rotate(360deg);}
to{transform:translate(-50%,-50%) rotate(0deg);}
}

</style>

</head>

<body>

<div class="orbit"></div>
<div class="orbit2"></div>

<div class="wrapper">

<h1>ArcAxis</h1>

<div class="subtitle">
SYSTEM MONITORING
</div>

<div class="text">
Ein infrastrukturelles Framework zur Diagnose struktureller Instabilität
in Organisationen und Produktionssystemen.
</div>

<div class="text">
Demonstrator<br>
<a href="https://mdg-indikation.de">mdg-indikation.de</a>
</div>

<div class="contact">
contact@arcaxis.de
</div>

</div>

</body>
</html>
