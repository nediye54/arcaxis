<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcAxis – System Monitoring</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0E1116;
    color: #E6EAF0;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
  }

  .arc {
    position: absolute;
    width: 800px;
    height: 800px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    clip-path: inset(0 0 50% 0);
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 600px;
  }

  h1 {
    font-size: 44px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  h2 {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #9CA3AF;
    margin-bottom: 40px;
  }

  p {
    font-size: 14px;
    color: #B8C0CC;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .contact {
    font-size: 12px;
    color: #6B7280;
  }
</style>
</head>

<body>

<div class="arc"></div>

<div class="container">
  <h1>ArcAxis</h1>
  <h2>System Monitoring</h2>
  <p>
    ArcAxis is currently in development.<br>
    Structural monitoring infrastructure in build phase.
  </p>
  <div class="contact">
    contact@arcaxis.de
  </div>
</div>

</body>
</html>
